name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch: {}

jobs:
  lint-and-test:
    name: Lint + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal test dependencies
        # Tests intentionally avoid heavy runtime deps (ccxt/web3/streamlit) so
        # CI installs only what's needed to import the tested modules.
        run: |
          python -m pip install --upgrade pip
          pip install "pydantic>=2.0,<3.0" pytest requests python-dotenv detect-secrets ruff

      - name: Ruff lint
        run: ruff check src/ tests/ dashboard/

      - name: Pytest
        env:
          OPENAI_API_KEY: ""
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_agent.py \
            -p no:cacheprovider

      - name: "Optional: test_agent (network-touching, allowed to fail)"
        continue-on-error: true
        run: python -m pytest tests/test_agent.py -v

      - name: Detect secrets vs baseline
        # Re-runs the scan and checks no new secrets appear outside the baseline.
        # Audited false-positives (placeholders in .env.example) are baselined.
        run: |
          git ls-files -z -- ':!venv/' ':!*.lock' ':!trader refs/' ':!.pytest_cache/' \
            | xargs -0 detect-secrets-hook --baseline .secrets.baseline
