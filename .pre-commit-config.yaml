# Pre-commit hook config (opt-in).
#
# Usage:
#     pip install pre-commit detect-secrets
#     pre-commit install
#
# After install, every `git commit` will run the secrets scanner.
# To run manually:
#     pre-commit run --all-files
#     detect-secrets scan --baseline .secrets.baseline
#
# Resolves docs/tech-debt.md ALTO: "Sem pre-commit hooks para deteccao de segredos"

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            venv/|
            \.git/|
            \.pytest_cache/|
            trader\ refs/|
            .*\.lock$
          )
